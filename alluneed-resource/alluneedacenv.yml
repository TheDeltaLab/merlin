name: alluneed
type: AzureContainerAppEnvironment
project: merlin
ring:
  - staging
  - test
region:
  - eastasia
  - koreacentral

dependencies:
  - resource: AzureLogAnalyticsWorkspace.alluneed
    isHardDependency: true

defaultConfig:
  logsWorkspaceId: ${ AzureLogAnalyticsWorkspace.alluneed.customerId }
  logsWorkspaceKey: ${ AzureLogAnalyticsWorkspace.alluneed.sharedKey }
  tags:
    merlin: "true"
    env: ${ this.ring }

exports:
  name: AzureResourceName