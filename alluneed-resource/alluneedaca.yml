name: alluneed
type: AzureContainerApp
project: merlintest
ring:
  - staging
  - test
region:
  - eastasia
  - koreacentral

authProvider:
  name: AzureEntraID

dependencies:
  - resource: AzureContainerRegistry.alluneed
    isHardDependency: true
  - resource: AzureContainerAppEnvironment.alluneed
    isHardDependency: true
  - resource: AzureDnsZone.chuangdns
    isHardDependency: false

defaultConfig:
  # ── Container / Image ─────────────────────────────────────────────
  image: ${ AzureContainerRegistry.alluneed.server }/alluneed:latest
  containerName: alluneed
  cpu: 4
  memory: 8.0Gi
  envVars:
    - APP_ENV=${ this.ring }
    - MODEL_BLOB_ACCOUNT=chuangdevstorage
    - MODEL_BLOB_CONTAINER=speaker-embedding-models
    - MODEL_BLOB_FOLDER=
    - MODEL_CACHE_FOLDER=.model_cache
    - WAV_CACHE_FOLDER=.wav_cache
    - PROJECT_NAME=alluneed
    - DEBUG_MODE=False
    - LOG_LEVEL=INFO


  # ── Ingress (CREATE ONLY) ──────────────────────────────────────────
  ingress: external
  targetPort: 8080
  transport: auto
  allowInsecure: false

  # ── Scaling ───────────────────────────────────────────────────────
  minReplicas: 1
  maxReplicas: 3

  # ── Revision ──────────────────────────────────────────────────────
  revisionsMode: single

  # ── Registry ──────────────────────────────────────────────────────
  registryServer: ${ AzureContainerRegistry.alluneed.server }
  registryIdentity: system

  # ── Managed Identity (CREATE ONLY) ────────────────────────────────
  systemAssigned: true

  # ── Environment (CREATE ONLY) ─────────────────────────────────────
  environment: ${ AzureContainerAppEnvironment.alluneed.name }

  # ── Misc ──────────────────────────────────────────────────────────
  noWait: false

  bindDnsZone:
      dnsZone: ${ AzureDnsZone.chuangdns.domainName }
      subDomain: alluneed.${ this.region }.${ this.ring }
    
  tags:
    merlin: "true"
    env: ${ this.ring }

specificConfig:
  - ring: staging
    maxReplicas: 5
  - ring: test
    maxReplicas: 2


exports:
  identity: AzureResourceManagedIdentity
  url: AzureContainerAppFqdn