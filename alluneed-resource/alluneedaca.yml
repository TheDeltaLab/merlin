name: alluneed
type: AzureContainerApp
project: merlin
ring:
  - staging
  - test
region:
  - eastasia
  - koreacentral

authProvider:
  name: AzureEntraID

dependencies:
  - resource: AzureContainerAppEnvironment.alluneed
    isHardDependency: true
  - resource: AzureContainerRegistry.shared
    isHardDependency: false
  - resource: AzureDnsZone.chuangdns
    isHardDependency: false
  - resource: AzureADApp.alluneed
    isHardDependency: true

defaultConfig:
  # ── Container / Image ─────────────────────────────────────────────
  image: ${ AzureContainerRegistry.shared.server }/alluneed:latest
  containerName: alluneed
  cpu: 4
  memory: 8.0Gi
  envVars:
    - APP_ENV=${ this.ring }
    - MODEL_BLOB_ACCOUNT=chuangdevstorage
    - MODEL_BLOB_CONTAINER=speaker-embedding-models
    - MODEL_BLOB_FOLDER=
    - MODEL_CACHE_FOLDER=.model_cache
    - WAV_CACHE_FOLDER=.wav_cache
    - PROJECT_NAME=alluneed
    - DEBUG_MODE=False
    - LOG_LEVEL=INFO

  # ── Health probes ──────────────────────────────────────────────────────────
  probes:
    - type: Liveness
      httpGet:
        path: /
        port: 8000
        scheme: HTTP
      periodSeconds: 60
      timeoutSeconds: 30
      failureThreshold: 30
    - type: Readiness
      httpGet:
        path: /
        port: 8000
        scheme: HTTP
      periodSeconds: 10
      timeoutSeconds: 30
      failureThreshold: 30
    - type: Startup
      httpGet:
        path: /
        port: 8000
        scheme: HTTP
      initialDelaySeconds: 1
      periodSeconds: 10
      timeoutSeconds: 30
      failureThreshold: 30


  # ── Ingress (CREATE ONLY) ──────────────────────────────────────────
  ingress: external
  targetPort: 8000
  transport: auto
  allowInsecure: false

  # ── Scaling ───────────────────────────────────────────────────────
  minReplicas: 1
  maxReplicas: 3

  # ── Revision ──────────────────────────────────────────────────────
  revisionsMode: single

  # ── Registry ──────────────────────────────────────────────────────
  registryServer: ${ AzureContainerRegistry.shared.server }
  registryIdentity: system

  # ── Managed Identity (CREATE ONLY) ────────────────────────────────
  systemAssigned: true

  # ── Environment (CREATE ONLY) ─────────────────────────────────────
  environment: ${ AzureContainerAppEnvironment.alluneed.name }

  # ── Misc ──────────────────────────────────────────────────────────
  noWait: false

  # ── EasyAuth (Built-in Authentication) ────────────────────────────
  # Merlin will automatically:
  #   1. Generate a client secret on the AD App (az ad app credential reset --append)
  #   2. Store the secret in an ACA secret (microsoft-provider-authentication-secret)
  #   3. Update the AD App's webRedirectUris with the ACA callback URL
  #   4. Enable EasyAuth and configure the Microsoft identity provider
  auth:
    clientId: ${ AzureADApp.alluneed.clientId }
    issuer: https://sts.windows.net/2c10b0b9-d9c1-4c81-85ee-6a2297ed77f4/v2.0
    unauthenticatedClientAction: RedirectToLoginPage

  bindDnsZone:
      dnsZone: ${ AzureDnsZone.chuangdns.domainName }
      subDomain: alluneed.${ this.region }.${ this.ring }
    
  tags:
    merlin: "true"
    env: ${ this.ring }

specificConfig:
  - ring: staging
    maxReplicas: 5
  - ring: test
    maxReplicas: 2


exports:
  identity: AzureResourceManagedIdentity
  url: AzureContainerAppFqdn
