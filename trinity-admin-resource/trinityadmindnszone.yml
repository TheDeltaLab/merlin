name: admindns
type: AzureDnsZone
project: merlin
ring:
  - test
  - staging

authProvider:
  name: AzureManagedIdentity

dependencies: []

defaultConfig:
  resourceGroupRegion: koreacentral
  tags:
    merlin: "true"
    env: ${ this.ring }

specificConfig:
  - ring: test
    dnsName: admin.test
    parentName: thebrainly.dev
  - ring: staging
    dnsName: admin.staging
    parentName: thebrainly.dev

exports:
  domainName: AzureDnsZoneName
