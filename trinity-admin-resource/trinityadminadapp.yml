name: admin
type: AzureADApp
project: merlin
ring:
  - test
  - staging

authProvider:
  name: AzureEntraID

dependencies: []

defaultConfig:
  signInAudience: AzureADMyOrg
  enableIdTokenIssuance: true
  appRoles: '[{"id":"00000000-0000-0000-0000-000000000001","displayName":"Access Admin API","description":"Allows the app to call Admin API as itself","value":"Admin.Access","allowedMemberTypes":["Application"],"isEnabled":true}]'

specificConfig:
  - ring: test
    displayName: merlin-admin-tst
    identifierUris:
      - api://self
  - ring: staging
    displayName: merlin-admin-stg
    identifierUris:
      - api://self

exports:
  clientId: AzureADAppClientId
