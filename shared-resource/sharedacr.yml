name: shared
type: AzureContainerRegistry
project: merlin
ring:
  - test
  - staging
region:
  - koreacentral
  - eastasia

authProvider:
  name: AzureManagedIdentity
  role: AcrPull
  scope: resource

dependencies: []

defaultConfig:
  sku: Basic
  adminUserEnabled: false

  tags:
    merlin: "true"
    env: ${ this.ring }

specificConfig: []

exports:
  server: AzureContainerRegistryServer
  name: AzureResourceName
