name: shared
type: AzureContainerRegistry
project: merlin
ring:
  - test
  - staging
region:
  - koreacentral
  - eastasia

authProvider:
  name: AzureManagedIdentity
  role: acrpull
  scope: resource

defaultConfig:
  sku: Standard
  adminEnabled: false
  publicNetworkEnabled: true
  allowTrustedServices: true
  allowExports: true

  tags:
    merlin: "true"
    env: ${ this.ring }

  images:
    # Trinity images
    - name: trinity/web
      tags:
        - nightly
      source: mcr.microsoft.com/mcr/hello-world
    - name: trinity/worker
      tags:
        - nightly
      source: mcr.microsoft.com/mcr/hello-world
    - name: trinity/admin
      tags:
        - nightly
      source: mcr.microsoft.com/mcr/hello-world
    - name: trinity/lance
      tags:
        - nightly
      source: mcr.microsoft.com/mcr/hello-world
    - name: trinity/lance-worker
      tags:
        - nightly
      source: mcr.microsoft.com/mcr/hello-world
    - name: trinity/home
      tags:
        - nightly
      source: mcr.microsoft.com/mcr/hello-world
    # Alluneed images
    - name: alluneed
      tags:
        - latest
      source: brainlytest-c4cscpe6b9b5f8fq.azurecr.io/alluneed:latest
    - name: alluneed-basic
      tags:
        - latest
      source: brainlytest-c4cscpe6b9b5f8fq.azurecr.io/alluneed-basic:latest

specificConfig:
  - ring: test
    sku: Basic

exports:
  server: AzureContainerRegistryServer
