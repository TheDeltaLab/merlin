name: letsencrypt-issuer
type: KubernetesManifest
# no project — shared across all projects
ring:
  - test
  - staging
region:
  - koreacentral
  - eastasia

dependencies:
  - resource: KubernetesHelmRelease.cert-manager
    isHardDependency: true

defaultConfig:
  manifest: |
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: letsencrypt-prod
    spec:
      acme:
        server: https://acme-v02.api.letsencrypt.org/directory
        email: ops@thebrainly.dev
        privateKeySecretRef:
          name: letsencrypt-prod
        solvers:
          - http01:
              ingress:
                ingressClassName: nginx

specificConfig: []

exports: {}
