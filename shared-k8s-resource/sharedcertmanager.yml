name: cert-manager
type: KubernetesHelmRelease
# no project — shared across all projects
ring:
  - test
  - staging
region:
  - koreacentral
  - eastasia

dependencies:
  - resource: KubernetesCluster.aks
    isHardDependency: true

defaultConfig:
  releaseName: cert-manager
  chart: jetstack/cert-manager
  repoName: jetstack
  repoUrl: https://charts.jetstack.io
  namespace: cert-manager
  createNamespace: true
  set:
    - key: crds.enabled
      value: "true"
  wait: true
  timeout: 5m0s
  # AKS admissionsenforcer takes ownership of cert-manager's ValidatingWebhookConfiguration
  # namespaceSelector field, causing Helm upgrade to fail with a field manager conflict.
  # Delete the webhook before upgrade so Helm can recreate it cleanly.
  preCommands:
    - kubectl delete validatingwebhookconfiguration cert-manager-webhook

specificConfig: []

exports: {}
