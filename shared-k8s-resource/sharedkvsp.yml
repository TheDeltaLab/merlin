name: kv-workload
type: AzureServicePrincipal
project: brainly
ring:
  - test
  - staging

authProvider:
  name: AzureEntraID

dependencies:
  - resource: KubernetesCluster.aks
    isHardDependency: true
  - resource: AzureKeyVault.shared
    isHardDependency: true
  # Note: test ring ABS reuses the legacy brainlydevblobstorage; staging uses the Merlin-managed account.
  # Dependencies are only used for compile-time ${ } expression resolution, and roleAssignments scopes
  # in this file are hardcoded ARM IDs, so we don't depend on AzureBlobStorage.shared here
  # (it doesn't exist on the test ring).

defaultConfig:
  tags:
    merlin: "true"
    env: ${ this.ring }

specificConfig:
  - ring: test
    displayName: brainly-kv-workload-tst
    federatedCredentials:
      # Trinity namespace ServiceAccount
      - name: trinity-sa
        issuer: ${ KubernetesCluster.aks.oidcIssuerUrl }
        subject: system:serviceaccount:trinity:trinity-workload-sa
      # Synapse namespace ServiceAccount
      - name: synapse-sa
        issuer: ${ KubernetesCluster.aks.oidcIssuerUrl }
        subject: system:serviceaccount:synapse:synapse-workload-sa
      # Alluneed namespace ServiceAccount
      - name: alluneed-sa
        issuer: ${ KubernetesCluster.aks.oidcIssuerUrl }
        subject: system:serviceaccount:alluneed:alluneed-workload-sa
      # Babbage namespace ServiceAccount
      - name: babbage-sa
        issuer: ${ KubernetesCluster.aks.oidcIssuerUrl }
        subject: system:serviceaccount:babbage:babbage-workload-sa
      # Lovelace namespace ServiceAccount
      - name: lovelace-sa
        issuer: ${ KubernetesCluster.aks.oidcIssuerUrl }
        subject: system:serviceaccount:lovelace:lovelace-workload-sa
      # Cortex namespace ServiceAccount
      - name: cortex-sa
        issuer: ${ KubernetesCluster.aks.oidcIssuerUrl }
        subject: system:serviceaccount:cortex:cortex-workload-sa
    roleAssignments:
      # Key Vault Secrets User on both regional Key Vaults
      - role: Key Vault Secrets User
        scope: /subscriptions/{subscriptionId}/resourceGroups/brainly-rg-tst-krc/providers/Microsoft.KeyVault/vaults/brainlysharedtstkrcakv
      - role: Key Vault Secrets User
        scope: /subscriptions/{subscriptionId}/resourceGroups/brainly-rg-tst-eas/providers/Microsoft.KeyVault/vaults/brainlysharedtsteasakv
      # Storage Blob Data Contributor — test ring reuses the legacy ABS (see docs/legacy-resources.md)
      - role: Storage Blob Data Contributor
        scope: /subscriptions/{subscriptionId}/resourceGroups/Storage-Dev-RG/providers/Microsoft.Storage/storageAccounts/brainlydevblobstorage

  - ring: staging
    displayName: brainly-kv-workload-stg
    federatedCredentials:
      - name: trinity-sa
        issuer: ${ KubernetesCluster.aks.oidcIssuerUrl }
        subject: system:serviceaccount:trinity:trinity-workload-sa
      - name: synapse-sa
        issuer: ${ KubernetesCluster.aks.oidcIssuerUrl }
        subject: system:serviceaccount:synapse:synapse-workload-sa
      - name: alluneed-sa
        issuer: ${ KubernetesCluster.aks.oidcIssuerUrl }
        subject: system:serviceaccount:alluneed:alluneed-workload-sa
      # Babbage namespace ServiceAccount
      - name: babbage-sa
        issuer: ${ KubernetesCluster.aks.oidcIssuerUrl }
        subject: system:serviceaccount:babbage:babbage-workload-sa
      # Lovelace namespace ServiceAccount
      - name: lovelace-sa
        issuer: ${ KubernetesCluster.aks.oidcIssuerUrl }
        subject: system:serviceaccount:lovelace:lovelace-workload-sa
      # Cortex namespace ServiceAccount
      - name: cortex-sa
        issuer: ${ KubernetesCluster.aks.oidcIssuerUrl }
        subject: system:serviceaccount:cortex:cortex-workload-sa
    roleAssignments:
      - role: Key Vault Secrets User
        scope: /subscriptions/{subscriptionId}/resourceGroups/brainly-rg-stg-krc/providers/Microsoft.KeyVault/vaults/brainlysharedstgkrcakv
      - role: Key Vault Secrets User
        scope: /subscriptions/{subscriptionId}/resourceGroups/brainly-rg-stg-eas/providers/Microsoft.KeyVault/vaults/brainlysharedstgeasakv
      # Storage Blob Data Contributor on both regional Storage Accounts
      - role: Storage Blob Data Contributor
        scope: /subscriptions/{subscriptionId}/resourceGroups/brainly-rg-stg-krc/providers/Microsoft.Storage/storageAccounts/brainlysharedstgkrcabs
      - role: Storage Blob Data Contributor
        scope: /subscriptions/{subscriptionId}/resourceGroups/brainly-rg-stg-eas/providers/Microsoft.Storage/storageAccounts/brainlysharedstgeasabs

exports:
  clientId: AzureServicePrincipalClientId
  objectId: AzureServicePrincipalObjectId
