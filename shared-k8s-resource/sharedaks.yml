name: aks
type: KubernetesCluster
# no project — shared across all projects
ring:
  - test
  - staging
region:
  - koreacentral
  - eastasia

dependencies: []

defaultConfig:
  enableManagedIdentity: true
  enableOidcIssuer: true
  enableWorkloadIdentity: true
  enableCsiSecretProvider: true
  enableSecretRotation: true
  attachAcr: brainlysharedacr
  nodeVmSize: Standard_D2s_v3
  nodeCount: 2
  enableAutoScaling: true
  minCount: 1
  maxCount: 15
  networkPlugin: azure
  # NetworkPolicy engine — without this, NetworkPolicy resources applied to
  # the cluster are silently ignored (they get accepted by the API server
  # but no controller enforces them at the data plane). `azure` integrates
  # natively with Azure CNI; `cilium` would require recreating the cluster.
  networkPolicy: azure
  noWait: false
  tags:
    merlin: "true"
    env: ${ this.ring }

specificConfig:
  - region: koreacentral
    location: koreacentral
  - region: eastasia
    location: eastasia

exports:
  oidcIssuerUrl: AzureAKSOidcIssuerUrl
