name: func
type: AzureFunctionApp
project: merlin
ring:
  - test
  - staging
region:
  - koreacentral
  - eastasia

authProvider:
  name: AzureEntraID

dependencies:
  - resource: AzureContainerRegistry.shared
    isHardDependency: false
  - resource: AzureBlobStorage.shared
    isHardDependency: false
    authProvider:
      name: AzureManagedIdentity
      role: Storage Blob Data Contributor
  - resource: AzureKeyVault.shared
    isHardDependency: false
    authProvider:
      name: AzureManagedIdentity
      role: Key Vault Secrets User

defaultConfig:
  image: ${ AzureContainerRegistry.shared.server }/trinity/func:nightly
  containerName: func
  storageAccount: ${ AzureBlobStorage.shared.name }
  consumptionPlanLocation: ${ this.region }

  envVars:
    - AzureWebJobsStorage=DefaultEndpointsProtocol=https;AccountName=${ AzureBlobStorage.shared.name };EndpointSuffix=core.windows.net

  tags:
    merlin: "true"
    env: ${ this.ring }

specificConfig: []

exports:
  identity: AzureResourceManagedIdentity
  url: AzureContainerAppFqdn
