name: synapse-secret-provider
type: KubernetesManifest
project: merlin
ring:
  - test
  - staging
region:
  - koreacentral

dependencies:
  - resource: KubernetesCluster.aks
    isHardDependency: true
  - resource: KubernetesServiceAccount.synapse-workload-sa
    isHardDependency: true
  - resource: AzureServicePrincipal.kv-workload
    isHardDependency: true
  - resource: AzureKeyVault.shared
    isHardDependency: true

defaultConfig:
  manifest: |
    apiVersion: secrets-store.csi.x-k8s.io/v1
    kind: SecretProviderClass
    metadata:
      name: synapse-secret-provider
      namespace: synapse
    spec:
      provider: azure
      parameters:
        usePodIdentity: "false"
        useVMManagedIdentity: "false"
        clientID: ${ AzureServicePrincipal.kv-workload.clientId }
        keyvaultName: ${ AzureKeyVault.shared.url }
        tenantId: ${ AzureServicePrincipal.kv-workload.clientId }
        objects: |
          array:
            - |
              objectName: synapse-database-url
              objectType: secret
            - |
              objectName: synapse-redis-url
              objectType: secret
            - |
              objectName: synapse-openai-compatible-api-key
              objectType: secret
            - |
              objectName: synapse-openrouter-api-key
              objectType: secret
            - |
              objectName: synapse-encryption-key
              objectType: secret
            - |
              objectName: synapse-jwt-secret
              objectType: secret
            - |
              objectName: synapse-upstash-redis-rest-url
              objectType: secret
            - |
              objectName: synapse-upstash-redis-rest-token
              objectType: secret
      secretObjects:
        - secretName: synapse-shared-secrets
          type: Opaque
          data:
            - objectName: synapse-database-url
              key: DATABASE_URL
            - objectName: synapse-redis-url
              key: REDIS_URL
            - objectName: synapse-openai-compatible-api-key
              key: OPENAI_COMPATIBLE_API_KEY
            - objectName: synapse-openrouter-api-key
              key: OPENROUTER_API_KEY
            - objectName: synapse-encryption-key
              key: ENCRYPTION_KEY
            - objectName: synapse-jwt-secret
              key: JWT_SECRET
            - objectName: synapse-upstash-redis-rest-url
              key: UPSTASH_REDIS_REST_URL
            - objectName: synapse-upstash-redis-rest-token
              key: UPSTASH_REDIS_REST_TOKEN

specificConfig: []

exports: {}
