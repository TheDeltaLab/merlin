name: synapse-shared-config
type: KubernetesConfigMap
project: synapse
ring:
  - test
  - staging
region:
  - koreacentral

dependencies:
  - resource: KubernetesCluster.aks
    isHardDependency: true

defaultConfig:
  namespace: synapse
  data:
    NODE_ENV: ${ this.ring }
    GATEWAY_URL: http://synapse-gateway.synapse.svc.cluster.local:3000
    OPENAI_COMPATIBLE_API_BASE_URL: https://openrouter.ai/api/v1
  labels:
    app.kubernetes.io/part-of: synapse
    managed-by: merlin

specificConfig: []

exports: {}
