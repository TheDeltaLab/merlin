name: trinity
type: AzureContainerAppEnvironment
project: merlin
ring:
  - test
  - staging
region:
  - koreacentral
  - eastasia

dependencies:
  - resource: AzureLogAnalyticsWorkspace.trinity
    isHardDependency: true

defaultConfig:
  location: ${ this.region }
  logsWorkspaceId: ${ AzureLogAnalyticsWorkspace.trinity.customerId }
  logsWorkspaceKey: ${ AzureLogAnalyticsWorkspace.trinity.sharedKey }

  tags:
    merlin: "true"
    env: ${ this.ring }

specificConfig: []

exports:
  name: AzureResourceName
