name: trinity
type: AzureLogAnalyticsWorkspace
project: merlin
ring:
  - test
  - staging
region:
  - koreacentral
  - eastasia

dependencies: []

defaultConfig:
  sku: PerGB2018
  location: ${ this.region }
  retentionInDays: 30
  dailyQuotaGb: -1
  ingestionAccess: Enabled
  queryAccess: Enabled

  tags:
    merlin: "true"
    env: ${ this.ring }

specificConfig:
  - ring: test
    retentionInDays: 30
    dailyQuotaGb: 1

exports:
  customerId: AzureLogAnalyticsWorkspaceCustomerId
  sharedKey: AzureLogAnalyticsWorkspaceSharedKey
