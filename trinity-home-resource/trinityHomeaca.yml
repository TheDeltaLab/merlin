name: home
type: AzureContainerApp
project: merlin
ring:
  - test
  - staging
region:
  - koreacentral
  - eastasia

authProvider:
  name: AzureEntraID

dependencies:
  - resource: AzureContainerAppEnvironment.trinity
    isHardDependency: true
  - resource: AzureContainerRegistry.shared
    isHardDependency: false
    authProvider:
      name: AzureManagedIdentity
      role: AcrPull

defaultConfig:
  image: ${ AzureContainerRegistry.shared.server }/trinity/home:nightly
  containerName: home
  cpu: 0.25
  memory: 0.5Gi

  envVars:
    - NODE_ENV=${ this.ring }
    - PORT=3000

  probes:
    - type: Liveness
      httpGet:
        path: /
        port: 3000
        scheme: HTTP
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    - type: Readiness
      httpGet:
        path: /
        port: 3000
        scheme: HTTP
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 48
    - type: Startup
      httpGet:
        path: /
        port: 3000
        scheme: HTTP
      initialDelaySeconds: 1
      periodSeconds: 1
      timeoutSeconds: 3
      failureThreshold: 240

  ingress: external
  targetPort: 3000
  transport: auto
  allowInsecure: false

  minReplicas: 0
  maxReplicas: 10
  scaleRuleName: http-scaler
  scaleRuleType: http
  scaleRuleHttpConcurrency: 10

  revisionsMode: single

  registryServer: ${ AzureContainerRegistry.shared.server }
  registryIdentity: system

  systemAssigned: true

  environment: ${ AzureContainerAppEnvironment.trinity.name }

  noWait: false

  # home serves www.thebrainly.ai and www.thebrainly.dev
  bindDnsZone:
    - dnsZone: thebrainly.ai
      subDomain: www
    - dnsZone: thebrainly.dev
      subDomain: www

  tags:
    merlin: "true"
    env: ${ this.ring }

specificConfig: []

exports:
  identity: AzureResourceManagedIdentity
  url: AzureContainerAppFqdn
