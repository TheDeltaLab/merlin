name: trinity-worker
type: KubernetesDeployment
project: merlin
ring:
  - test
  - staging
region:
  - koreacentral
  - eastasia

dependencies:
  - resource: KubernetesCluster.aks
    isHardDependency: true
  - resource: KubernetesService.trinity-admin
    isHardDependency: true
  - resource: KubernetesConfigMap.trinity-shared-config
    isHardDependency: true
  - resource: KubernetesManifest.trinity-secret-provider
    isHardDependency: true
  - resource: KubernetesServiceAccount.trinity-workload-sa
    isHardDependency: true
  - resource: AzureKeyVault.shared
    isHardDependency: true

defaultConfig:
  namespace: trinity
  replicas: 1
  serviceAccountName: trinity-workload-sa
  podLabels:
    azure.workload.identity/use: "true"

  volumes:
    - name: secrets-store
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: trinity-secret-provider

  containers:
    - name: worker
      image: merlinsharedstgkrcacr.azurecr.io/trinity/worker:nightly
      imagePullPolicy: IfNotPresent
      port: 3000
      cpuRequest: "250m"
      memoryRequest: 512Mi
      cpuLimit: "500m"
      memoryLimit: 1Gi

      envFrom:
        - configMapRef: trinity-shared-config
        - secretRef: trinity-shared-secrets

      envVars:
        # Per-service values (differ from admin/web)
        - ADMIN_SERVER_SCOPE=api://f33ed582-6f07-4c57-86b5-86cb2f76da8f/.default
        - REDIS_USER=1def9bf9-6cd1-4fe3-a596-e150c12995d3
        # Key Vault URL for worker
        - KEY_VAULT_URL=${ AzureKeyVault.shared.url }
        # Turing API tenant ID (worker-only)
        - TURING_API_TENANT_ID=2c10b0b9-d9c1-4c81-85ee-6a2297ed77f4
        # ALI ASR config (worker-only)
        - ALI_FUN_ASR_RESULT_BLOB_ACCOUNT=chuangdevstorage
        - ALI_FUN_ASR_RESULT_BLOB_CONTAINER=stt-result
        - ALI_FUN_ASR_RESULT_ORIGINAL_FOLDER=original

      volumeMounts:
        - name: secrets-store
          mountPath: /mnt/secrets-store
          readOnly: true

      livenessProbe:
        httpGet:
          path: /health
          port: 3000
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /health
          port: 3000
        periodSeconds: 5
        timeoutSeconds: 5
        failureThreshold: 48
      startupProbe:
        httpGet:
          path: /health
          port: 3000
        initialDelaySeconds: 1
        periodSeconds: 1
        timeoutSeconds: 3
        failureThreshold: 240

specificConfig: []

exports: {}
