name: trinity-secret-provider
type: KubernetesManifest
project: merlin
ring:
  - test
  - staging
region:
  - koreacentral
  - eastasia

dependencies:
  - resource: KubernetesCluster.aks
    isHardDependency: true
  - resource: KubernetesServiceAccount.trinity-workload-sa
    isHardDependency: true
  - resource: AzureServicePrincipal.kv-workload
    isHardDependency: true
  - resource: AzureKeyVault.shared
    isHardDependency: true

defaultConfig:
  manifest: |
    apiVersion: secrets-store.csi.x-k8s.io/v1
    kind: SecretProviderClass
    metadata:
      name: trinity-secret-provider
      namespace: trinity
    spec:
      provider: azure
      parameters:
        usePodIdentity: "false"
        useVMManagedIdentity: "false"
        clientID: ${ AzureServicePrincipal.kv-workload.clientId }
        keyvaultName: ${ AzureKeyVault.shared.name }
        tenantId: 2c10b0b9-d9c1-4c81-85ee-6a2297ed77f4
        objects: |
          array:
            - |
              objectName: database-url
              objectType: secret
            - |
              objectName: database-url-admin
              objectType: secret
            - |
              objectName: jwt-secret-key
              objectType: secret
      secretObjects:
        - secretName: trinity-shared-secrets
          type: Opaque
          data:
            - objectName: database-url
              key: DATABASE_URL
            - objectName: database-url-admin
              key: DATABASE_URL_ADMIN
            - objectName: jwt-secret-key
              key: SECRET_KEY

specificConfig: []

exports: {}
