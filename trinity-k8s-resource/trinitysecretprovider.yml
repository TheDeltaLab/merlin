name: trinity-secret-provider
type: KubernetesManifest
project: merlin
ring:
  - test
  - staging
region:
  - koreacentral
  - eastasia

dependencies:
  - resource: KubernetesCluster.aks
    isHardDependency: true
  - resource: KubernetesServiceAccount.trinity-workload-sa
    isHardDependency: true
  - resource: AzureServicePrincipal.kv-workload
    isHardDependency: true
  - resource: AzureKeyVault.shared
    isHardDependency: true

defaultConfig:
  manifest: |
    apiVersion: secrets-store.csi.x-k8s.io/v1
    kind: SecretProviderClass
    metadata:
      name: trinity-secret-provider
      namespace: trinity
    spec:
      provider: azure
      parameters:
        usePodIdentity: "false"
        useVMManagedIdentity: "false"
        clientID: ${ AzureServicePrincipal.kv-workload.clientId }
        keyvaultName: ${ AzureKeyVault.shared.url }
        tenantId: ${ AzureServicePrincipal.kv-workload.clientId }
        objects: |
          array:
            - |
              objectName: trinity-database-url
              objectType: secret
            - |
              objectName: trinity-database-url-admin
              objectType: secret
            - |
              objectName: trinity-redis-url
              objectType: secret
            - |
              objectName: trinity-ali-key-endpoint
              objectType: secret
            - |
              objectName: trinity-turing-api-scope
              objectType: secret
            - |
              objectName: trinity-alluneed-scope
              objectType: secret
            - |
              objectName: trinity-alluneed-tenant-id
              objectType: secret
            - |
              objectName: trinity-jwt-secret-key
              objectType: secret
      secretObjects:
        - secretName: trinity-shared-secrets
          type: Opaque
          data:
            - objectName: trinity-database-url
              key: DATABASE_URL
            - objectName: trinity-database-url-admin
              key: DATABASE_URL_ADMIN
            - objectName: trinity-redis-url
              key: REDIS_URL
            - objectName: trinity-ali-key-endpoint
              key: ALI_KEY_ENDPOINT
            - objectName: trinity-turing-api-scope
              key: TURING_API_SCOPE
            - objectName: trinity-alluneed-scope
              key: ALLUNEED_SCOPE
            - objectName: trinity-alluneed-tenant-id
              key: ALLUNEED_TENANT_ID
            - objectName: trinity-jwt-secret-key
              key: SECRET_KEY

specificConfig: []

exports: {}
