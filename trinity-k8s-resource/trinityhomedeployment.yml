name: trinity-home
type: KubernetesDeployment
project: merlin
ring:
  - test
  - staging
region:
  - koreacentral
  - eastasia

dependencies:
  - resource: KubernetesCluster.aks
    isHardDependency: true
  - resource: KubernetesConfigMap.trinity-shared-config
    isHardDependency: true

defaultConfig:
  namespace: trinity
  replicas: 1

  containers:
    - name: home
      image: deltasharedtestkrcacr.azurecr.io/trinity/home:nightly
      imagePullPolicy: IfNotPresent
      port: 3000
      cpuRequest: "125m"
      memoryRequest: 256Mi
      cpuLimit: "250m"
      memoryLimit: 512Mi

      envFrom:
        - configMapRef: trinity-shared-config

      envVars:
        - OTEL_EXPORTER_OTLP_ENDPOINT=

      livenessProbe:
        httpGet:
          path: /
          port: 3000
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /
          port: 3000
        periodSeconds: 5
        timeoutSeconds: 5
        failureThreshold: 48
      startupProbe:
        httpGet:
          path: /
          port: 3000
        initialDelaySeconds: 1
        periodSeconds: 1
        timeoutSeconds: 3
        failureThreshold: 240

specificConfig: []

exports: {}
