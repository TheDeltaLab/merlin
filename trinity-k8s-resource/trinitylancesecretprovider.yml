name: trinity-lance-secret-provider
type: KubernetesManifest
project: merlin
ring:
  - test
  - staging
region:
  - koreacentral
  - eastasia

dependencies:
  - resource: KubernetesCluster.aks
    isHardDependency: true
  - resource: KubernetesServiceAccount.trinity-workload-sa
    isHardDependency: true
  - resource: AzureServicePrincipal.kv-workload
    isHardDependency: true
  - resource: AzureKeyVault.shared
    isHardDependency: true

defaultConfig:
  manifest: |
    apiVersion: secrets-store.csi.x-k8s.io/v1
    kind: SecretProviderClass
    metadata:
      name: trinity-lance-secret-provider
      namespace: trinity
    spec:
      provider: azure
      parameters:
        usePodIdentity: "false"
        useVMManagedIdentity: "false"
        clientID: ${ AzureServicePrincipal.kv-workload.clientId }
        keyvaultName: ${ AzureKeyVault.shared.name }
        tenantId: 2c10b0b9-d9c1-4c81-85ee-6a2297ed77f4
        objects: |
          array:
            - |
              objectName: database-url-lovelace
              objectType: secret
            - |
              objectName: openai-compatible-api-key
              objectType: secret
            - |
              objectName: synapse-api-key
              objectType: secret
      secretObjects:
        - secretName: trinity-lance-secrets
          type: Opaque
          data:
            - objectName: database-url-lovelace
              key: DATABASE_URL
            - objectName: openai-compatible-api-key
              key: OPENAI_COMPATIBLE_API_KEY
            - objectName: synapse-api-key
              key: SYNAPSE_API_KEY
        - secretName: trinity-lance-worker-secrets
          type: Opaque
          data:
            - objectName: database-url-lovelace
              key: DATABASE_URL
            - objectName: synapse-api-key
              key: SYNAPSE_API_KEY

specificConfig: []

exports: {}
