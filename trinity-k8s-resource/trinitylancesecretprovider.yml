name: trinity-lance-secret-provider
type: KubernetesManifest
project: merlin
ring:
  - test
  - staging
region:
  - koreacentral
  - eastasia

dependencies:
  - resource: KubernetesCluster.aks
    isHardDependency: true
  - resource: KubernetesServiceAccount.trinity-workload-sa
    isHardDependency: true
  - resource: AzureServicePrincipal.kv-workload
    isHardDependency: true
  - resource: AzureKeyVault.shared
    isHardDependency: true

defaultConfig:
  manifest: |
    apiVersion: secrets-store.csi.x-k8s.io/v1
    kind: SecretProviderClass
    metadata:
      name: trinity-lance-secret-provider
      namespace: trinity
    spec:
      provider: azure
      parameters:
        usePodIdentity: "false"
        useVMManagedIdentity: "false"
        clientID: ${ AzureServicePrincipal.kv-workload.clientId }
        keyvaultName: ${ AzureKeyVault.shared.url }
        tenantId: ${ AzureServicePrincipal.kv-workload.clientId }
        objects: |
          array:
            - |
              objectName: lance-database-url
              objectType: secret
            - |
              objectName: lance-upstash-redis-rest-token
              objectType: secret
            - |
              objectName: lance-langfuse-secret-key
              objectType: secret
            - |
              objectName: lance-langfuse-public-key
              objectType: secret
            - |
              objectName: lance-portkey-api-key
              objectType: secret
            - |
              objectName: lance-openai-compatible-api-key
              objectType: secret
            - |
              objectName: lance-synapse-api-key
              objectType: secret
            - |
              objectName: lance-worker-database-url
              objectType: secret
            - |
              objectName: lance-worker-redis-url
              objectType: secret
            - |
              objectName: lance-worker-redis-user
              objectType: secret
            - |
              objectName: lance-worker-synapse-api-key
              objectType: secret
      secretObjects:
        - secretName: trinity-lance-secrets
          type: Opaque
          data:
            - objectName: lance-database-url
              key: DATABASE_URL
            - objectName: lance-upstash-redis-rest-token
              key: UPSTASH_REDIS_REST_TOKEN
            - objectName: lance-langfuse-secret-key
              key: LANGFUSE_SECRET_KEY
            - objectName: lance-langfuse-public-key
              key: LANGFUSE_PUBLIC_KEY
            - objectName: lance-portkey-api-key
              key: PORTKEY_API_KEY
            - objectName: lance-openai-compatible-api-key
              key: OPENAI_COMPATIBLE_API_KEY
            - objectName: lance-synapse-api-key
              key: SYNAPSE_API_KEY
        - secretName: trinity-lance-worker-secrets
          type: Opaque
          data:
            - objectName: lance-worker-database-url
              key: DATABASE_URL
            - objectName: lance-worker-redis-url
              key: REDIS_URL
            - objectName: lance-worker-redis-user
              key: REDIS_USER
            - objectName: lance-worker-synapse-api-key
              key: SYNAPSE_API_KEY

specificConfig: []

exports: {}
