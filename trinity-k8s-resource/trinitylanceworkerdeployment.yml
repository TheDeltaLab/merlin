name: trinity-lance-worker
type: KubernetesDeployment
project: merlin
ring:
  - test
  - staging
region:
  - koreacentral
  - eastasia

dependencies:
  - resource: KubernetesCluster.aks
    isHardDependency: true
  - resource: KubernetesService.synapse-gateway
    isHardDependency: true
  - resource: KubernetesManifest.trinity-lance-secret-provider
    isHardDependency: true
  - resource: KubernetesServiceAccount.trinity-workload-sa
    isHardDependency: true
  - resource: AzureRedisEnterprise.shared
    isHardDependency: true

defaultConfig:
  namespace: trinity
  replicas: 1
  serviceAccountName: trinity-workload-sa
  podLabels:
    azure.workload.identity/use: "true"

  volumes:
    - name: secrets-store
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: trinity-lance-secret-provider

  containers:
    - name: lance-worker
      image: merlinsharedstgkrcacr.azurecr.io/trinity/lance-worker:nightly
      imagePullPolicy: IfNotPresent
      port: 3000
      cpuRequest: "250m"
      memoryRequest: 512Mi
      cpuLimit: "500m"
      memoryLimit: 1Gi

      envFrom:
        - secretRef: trinity-lance-worker-secrets

      envVars:
        # Same as old ACA: NODE_ENV + REDIS_URL from resource
        - NODE_ENV=${ this.ring }
        - REDIS_URL=${ AzureRedisEnterprise.shared.redisUrl }
        - PORT=3000
        # LanceDB — uses Azure Blob Storage
        - LANCEDB_BASE_URL=abs://brainlydevblobstorage/lance-data/
        - LANCE_EMBEEDING_MODEL_NAME=text-embedding
        # Synapse — K8s internal (cross-namespace)
        - SYNAPSE_URL=http://synapse-gateway.synapse.svc.cluster.local:3000
        - SYNAPSE_TEXT_EMBEDDING_MODEL=qwen/qwen3-embedding-8b
        - SYNAPSE_TEXT_EMBEDDING_PROVIDER=openrouter

      volumeMounts:
        - name: secrets-store
          mountPath: /mnt/secrets-store
          readOnly: true

      livenessProbe:
        httpGet:
          path: /health
          port: 3000
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /health
          port: 3000
        periodSeconds: 5
        timeoutSeconds: 5
        failureThreshold: 48
      startupProbe:
        httpGet:
          path: /health
          port: 3000
        initialDelaySeconds: 1
        periodSeconds: 1
        timeoutSeconds: 3
        failureThreshold: 240

specificConfig: []

exports: {}
