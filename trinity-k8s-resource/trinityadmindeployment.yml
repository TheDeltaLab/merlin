name: trinity-admin
type: KubernetesDeployment
project: merlin
ring:
  - test
  - staging
region:
  - koreacentral
  - eastasia

dependencies:
  - resource: KubernetesCluster.aks
    isHardDependency: true
  - resource: KubernetesConfigMap.trinity-shared-config
    isHardDependency: true
  - resource: KubernetesManifest.trinity-secret-provider
    isHardDependency: true
  - resource: KubernetesServiceAccount.trinity-workload-sa
    isHardDependency: true

defaultConfig:
  namespace: trinity
  replicas: 1
  serviceAccountName: trinity-workload-sa
  podLabels:
    azure.workload.identity/use: "true"

  volumes:
    - name: secrets-store
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: trinity-secret-provider

  containers:
    - name: admin
      image: merlinsharedstgkrcacr.azurecr.io/trinity/admin:nightly
      imagePullPolicy: IfNotPresent
      port: 3000
      cpuRequest: "250m"
      memoryRequest: 512Mi
      cpuLimit: "500m"
      memoryLimit: 1Gi

      envFrom:
        - configMapRef: trinity-shared-config
        - secretRef: trinity-shared-secrets

      envVars:
        # Per-service values (differ from web/worker)
        - ADMIN_SERVER_SCOPE=api://312331ad-04a5-496b-aa10-45a0f922d2c6/.default
        - REDIS_USER=16200598-31c1-4b8f-8e26-fe5ac716d93c

      volumeMounts:
        - name: secrets-store
          mountPath: /mnt/secrets-store
          readOnly: true

      livenessProbe:
        httpGet:
          path: /
          port: 3000
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /
          port: 3000
        periodSeconds: 5
        timeoutSeconds: 5
        failureThreshold: 48
      startupProbe:
        httpGet:
          path: /
          port: 3000
        initialDelaySeconds: 1
        periodSeconds: 1
        timeoutSeconds: 3
        failureThreshold: 240

specificConfig: []

exports: {}
