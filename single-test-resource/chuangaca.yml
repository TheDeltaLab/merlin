name: chuangaca
type: AzureContainerApp
project: merlintest
ring:
  - staging
  - test
region:
  - eastasia
  - koreacentral

authProvider:
  name: AzureEntraID

dependencies:
  - resource: AzureContainerRegistry.chuangacr
    isHardDependency: true
  - resource: AzureContainerAppEnvironment.chuangacenv
    isHardDependency: true

defaultConfig:
  # ── Container / Image ─────────────────────────────────────────────
  image: ${ AzureContainerRegistry.chuangacr.server }/chuangdemo:latest
  containerName: chuangdemo
  cpu: 0.5
  memory: 1.0Gi
  envVars:
    - APP_ENV=${ this.ring }

  # ── Ingress (CREATE ONLY) ──────────────────────────────────────────
  ingress: external
  targetPort: 8080
  transport: auto
  allowInsecure: false

  # ── Scaling ───────────────────────────────────────────────────────
  minReplicas: 1
  maxReplicas: 3

  # ── Revision ──────────────────────────────────────────────────────
  revisionsMode: single

  # ── Registry ──────────────────────────────────────────────────────
  registryServer: ${ AzureContainerRegistry.chuangacr.server }
  registryIdentity: system

  # ── Managed Identity (CREATE ONLY) ────────────────────────────────
  systemAssigned: true

  # ── Environment (CREATE ONLY) ─────────────────────────────────────
  environment: ${ AzureContainerAppEnvironment.chuangacenv.name }

  # ── Misc ──────────────────────────────────────────────────────────
  noWait: false
  tags:
    merlin: "true"

specificConfig:
  - ring: staging
    cpu: 1
    memory: 2.0Gi
    maxReplicas: 5
    tags:
      env: staging
  - ring: test
    cpu: 0.25
    memory: 0.5Gi
    minReplicas: 0
    maxReplicas: 1
    tags:
      env: test

# exports example:
# simple format:
# identity: getResourceIdentity

# object format:
# identity:
#   name: getResourceIdentity
#   someArg: someValue
#   anotherArg: anotherValue
exports:
  identity: AzureResourceManagedIdentity
  url: AzureContainerAppFqdn