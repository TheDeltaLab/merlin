name: chuangacenv
type: AzureContainerAppEnvironment
project: merlintest
ring:
  - staging
  - test
region:
  - eastasia
  - koreacentral

dependencies:
  - resource: AzureLogAnalyticsWorkspace.chuanglaw
    isHardDependency: true

defaultConfig:
  logsWorkspaceId: ${ AzureLogAnalyticsWorkspace.chuanglaw.customerId }
  logsWorkspaceKey: ${ AzureLogAnalyticsWorkspace.chuanglaw.sharedKey }
  tags:
    merlin: "true"
    env: ${ this.ring }

exports:
  name: AzureResourceName