name: chuangacenv
type: AzureContainerAppEnvironment
project: merlintest
ring:
  - staging
  - test
region:
  - eastasia
  - koreacentral

dependencies: 
  - resource: chuanglaw
    isHardDependency: true

defaultConfig:
  logsWorkspaceId: ${ chuanglaw.customerId }
  logsWorkspaceKey: ${ chuanglaw.sharedKey }
  tags:
    merlin: "true"
    env: ${ this.ring }

exports:
  name: AzureResourceName