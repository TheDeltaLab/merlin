# Example Azure Container App Resource Configuration

name: worker
type: AzureContainerApp
parent: cae

# Will create 4 resources (test/production) * (eastus/westus)
ring:
  - test
  - production

region:
  - eastus
  - westus

authProvider: microsoftIdentityProviderAuth

dependencies:
  - resource: acr
    isHardDependency: true
  - resource: akv
  - resource: postgresql
  - resource: redis
  - resource: abs

defaultConfig:
  cpu: 2
  memory: 4Gi
  identityProvider:
    type: MicrosoftIdentity
  env:
    - name: REDIS_URL
      # ${ <resource>.<export value> }
      value: ${ redis.connectionString }
    - name: REDIS_USER
      # self-pointing variable
      value: ${ worker.identity }
    - name: DATABASE_URL
      value: ${ postgresql.connectionString }
    - name: NODE_ENV
      value: production

specificConfigs:
  - ring: production
    region: eastus
    cpu: 4
    memory: 8Gi

exports:
  - url: getResourceUrl
  - identity: getResourceIdentity
  - api_scope: getResourceApiScope
