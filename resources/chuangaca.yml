name: chuangaca
type: AzureContainerApp
project: merlintest
ring:
  - staging
  - test
region:
  - eastasia
  - koreacentral

authProvider:
  name: AzureEntraID

dependencies:
  - resource: chuangacr
    isHardDependency: true
  - resource: chuangabs
    isHardDependency: false

defaultConfig:
  # ── Container / Image ─────────────────────────────────────────────
  image: ${ chuangacr.server }/myapp:latest
  containerName: myapp
  cpu: 0.5
  memory: 1Gi
  envVars:
    - APP_ENV=${ this.ring }
    - STORAGE_ACCOUNT=${ chuangabs.name }

  # ── Ingress (CREATE ONLY) ──────────────────────────────────────────
  ingress: external
  targetPort: 8080
  transport: auto
  allowInsecure: false

  # ── Scaling ───────────────────────────────────────────────────────
  minReplicas: 1
  maxReplicas: 3

  # ── Revision ──────────────────────────────────────────────────────
  revisionsMode: single

  # ── Registry ──────────────────────────────────────────────────────
  registryServer: ${ chuangacr.server }
  registryIdentity: system

  # ── Managed Identity (CREATE ONLY) ────────────────────────────────
  systemAssigned: true

  # ── Environment (CREATE ONLY) ─────────────────────────────────────
  environment: my-container-env

  # ── Misc ──────────────────────────────────────────────────────────
  noWait: false
  tags:
    merlin: "true"

specificConfig:
  - ring: staging
    cpu: 1
    maxReplicas: 5
    tags:
      env: staging
  - ring: test
    cpu: 0.25
    memory: 0.5Gi
    minReplicas: 0
    maxReplicas: 1
    tags:
      env: test

exports:
  - identity: getResourceIdentity
  - apiScope: getResourceApiScope
  - url: getResourceUrl